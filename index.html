<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="color-scheme" content="dark light" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Home App" />
  <meta name="description" content="Gestione lavori di casa, stanze, piani/aree e progetti." />
  <title>Home App</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="icon" type="image/png" href="./icon-192.png" />

  <!-- Stylesheets: base -> tema -> layout -> componenti -> viste -->
  <link rel="stylesheet" href="./base.css" />
  <link rel="stylesheet" href="./themes.css" />
  <link rel="stylesheet" href="./layout.css" />
  <link rel="stylesheet" href="./components.css" />
  <link rel="stylesheet" href="./home.css" />
  <link rel="stylesheet" href="./lavori.css" />
  <link rel="stylesheet" href="./idee.css" />
  <link rel="stylesheet" href="./spesa.css" />
  <link rel="stylesheet" href="./stanza.css" />
  <link rel="stylesheet" href="./opzioni.css" />
</head>
<body>
  <!-- Header (renderizzato da app.js) -->
  <header id="app-header" class="app-header" hidden></header>

  <!-- Vista principale (renderizzata da app.js) -->
  <main id="view" class="view" role="main"></main>

  <!-- Bottom navigation (renderizzata da app.js) -->
  <nav id="bottom-nav" class="bottom-nav" aria-label="Navigazione principale" hidden></nav>

  <!-- Host per toast e modali -->
  <div id="toast-host" class="toast-host" aria-live="polite" aria-atomic="true"></div>
  <div id="modal-host" class="modal-host"></div>

  <script src="./app.js"></script>
  <script src="./cloud-sync.js"></script>
</body>
</html>
